<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX | Hub de Medios</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #FF5722;
            --accent-glow: rgba(255, 87, 34, 0.3);
            --bg-deep: #050505;
            --bg-surface: #121212;
            --bg-card: #1c1c1c;
            --text-main: #eeeeee;
            --text-dim: #a0a0a0;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-width: 260px;
            --nav-height: 0px; /* Se activa en móvil */
        }

        * { box-sizing: border-box; }
        
        body { 
            margin: 0; 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            height: 100vh; 
            overflow: hidden;
            flex-direction: row; /* PC por defecto */
        }

        /* Sidebar - Oculta en móvil, lateral en PC */
        .sidebar { 
            width: var(--sidebar-width); 
            background: var(--bg-surface); 
            padding: 40px 20px; 
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 30px;
            padding-left: 15px;
            text-shadow: 0 0 15px var(--accent-glow);
        }

        .nav-item { 
            padding: 14px 18px; 
            cursor: pointer; 
            border-radius: 12px; 
            transition: var(--transition); 
            display: flex; 
            align-items: center; 
            gap: 12px;
            color: var(--text-dim);
            font-weight: 500;
            text-decoration: none;
        }

        .nav-item.active { 
            background: var(--accent); 
            color: white; 
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        /* Contenedor Principal */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .gui-view { 
            display: none; 
            flex-direction: column; 
            height: 100%; 
            background: linear-gradient(180deg, #0a0a0a 0%, #050505 100%);
        }
        
        .gui-view.active { display: flex; }

        /* Reproductor */
        .player-zone { 
            width: 100%; 
            background: #000; 
            aspect-ratio: 16/9; 
            max-height: 45vh;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        video { width: 100%; height: 100%; object-fit: contain; }

        /* Buscador adaptable */
        .search-container { padding: 20px; }
        .search-bar {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid #333;
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            transition: var(--transition);
        }

        /* Grid Adaptable */
        .content-zone { 
            flex: 1; 
            overflow-y: auto; 
            padding: 0 20px 80px 20px; /* Extra padding inferior para nav móvil */
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; 
        }

        .card { 
            background: var(--bg-card); 
            border-radius: 12px; 
            overflow: hidden;
            border: 1px solid #222;
        }

        .card-info { padding: 10px; }
        .card-info h4 { margin: 0; font-size: 0.85rem; }

        /* --- MEDIA QUERIES PARA MÓVIL --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }

            .sidebar {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                height: 70px;
                flex-direction: row;
                padding: 10px;
                justify-content: space-around;
                border-right: none;
                border-top: 1px solid #222;
                background: rgba(18, 18, 18, 0.95);
                backdrop-filter: blur(10px);
            }

            .logo { display: none; } /* Ocultar logo en nav móvil */
            
            .nav-item {
                flex-direction: column;
                gap: 4px;
                font-size: 0.7rem;
                padding: 8px;
                border-radius: 8px;
                flex: 1;
                text-align: center;
            }

            .nav-item span { font-size: 1.2rem; }

            .content-zone { padding: 0 15px 100px 15px; }
            
            .grid { 
                grid-template-columns: repeat(2, 1fr); /* 2 columnas en móvil */
                gap: 10px;
            }

            .player-zone { max-height: 30vh; }
        }

        /* Estilo para el reproductor de Radio en móvil */
        .radio-header {
            padding: 20px;
            background: #181818;
            text-align: center;
        }
        audio { width: 100%; }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">VORTEX</div>
        <div class="nav-item active" onclick="showGUI('tv-gui', this)">
            <span>📺</span> <div>TV</div>
        </div>
        <div class="nav-item" onclick="showGUI('radio-gui', this)">
            <span>📻</span> <div>Radio</div>
        </div>
    </aside>

    <div class="main-container">
        <main id="tv-gui" class="gui-view active">
            <div class="player-zone">
                <video id="tv-video" controls poster="https://images.unsplash.com/photo-1594909122845-11baa439b7bf?auto=format&fit=crop&q=80&w=1000"></video>
            </div>
            <div class="search-container">
                <input type="text" id="tv-search" class="search-bar" placeholder="Buscar canales...">
            </div>
            <div class="content-zone">
                <div class="grid" id="tv-grid">
                    <div class="card"><div style="height:100px; background:#333;"></div><div class="card-info"><h4>Canal Demo 1</h4></div></div>
                    <div class="card"><div style="height:100px; background:#333;"></div><div class="card-info"><h4>Canal Demo 2</h4></div></div>
                </div>
            </div>
        </main>

        <main id="radio-gui" class="gui-view">
            <div class="radio-header">
                <h3 id="radio-title" style="font-size: 1rem;">Selecciona una emisora</h3>
                <audio id="radio-audio" controls></audio>
            </div>
            <div class="search-container">
                <input type="text" id="radio-search" class="search-bar" placeholder="Buscar emisoras...">
            </div>
            <div class="content-zone">
                <div class="grid" id="radio-grid"></div>
            </div>
        </main>
    </div>

    <script>
        function showGUI(id, el) {
            document.querySelectorAll('.gui-view').forEach(g => g.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        async function loadRadio(q = 'Colombia') {
            const grid = document.getElementById('radio-grid');
            grid.innerHTML = '<p style="padding:20px; color:var(--text-dim)">Cargando...</p>';
            try {
                const res = await fetch(`https://de1.api.radio-browser.info/json/stations/byname/${q}?limit=20`);
                const data = await res.json();
                grid.innerHTML = '';
                data.forEach(r => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div style="height:100px; background:#222; display:flex; align-items:center; justify-content:center; font-size:1.5rem;">📻</div>
                        <div class="card-info">
                            <h4>${r.name}</h4>
                            <small style="color:var(--text-dim)">${r.country}</small>
                        </div>
                    `;
                    card.onclick = () => {
                        document.getElementById('radio-title').innerText = r.name;
                        const audio = document.getElementById('radio-audio');
                        audio.src = r.url_resolved;
                        audio.play();
                    };
                    grid.appendChild(card);
                });
            } catch (e) {
                grid.innerHTML = '<p>Error.</p>';
            }
        }

        document.getElementById('radio-search').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') loadRadio(e.target.value);
        });

        loadRadio();
    </script>
</body>
</html>
