<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX | Hub de Medios</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #FF5722;
            --accent-glow: rgba(255, 87, 34, 0.3);
            --bg-deep: #050505;
            --bg-surface: #121212;
            --bg-card: #1c1c1c;
            --text-main: #eeeeee;
            --text-dim: #a0a0a0;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; }
        
        body { 
            margin: 0; 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Sidebar Elegante */
        .sidebar { 
            width: 260px; 
            background: var(--bg-surface); 
            padding: 40px 20px; 
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 30px;
            padding-left: 15px;
            text-shadow: 0 0 15px var(--accent-glow);
        }

        .nav-item { 
            padding: 14px 18px; 
            cursor: pointer; 
            border-radius: 12px; 
            transition: var(--transition); 
            display: flex; 
            align-items: center; 
            gap: 12px;
            color: var(--text-dim);
            font-weight: 500;
        }

        .nav-item:hover { 
            background: rgba(255,255,255,0.05); 
            color: white; 
        }

        .nav-item.active { 
            background: var(--accent); 
            color: white; 
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        /* Contenedores de GUI */
        .gui-view { 
            flex: 1; 
            display: none; 
            flex-direction: column; 
            height: 100%; 
            background: linear-gradient(180deg, #0a0a0a 0%, #050505 100%);
        }
        
        .gui-view.active { display: flex; }

        /* Zona de Video */
        .player-zone { 
            width: 100%; 
            background: #000; 
            aspect-ratio: 16/9; 
            max-height: 50vh;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        video { width: 100%; height: 100%; outline: none; }

        /* Buscador */
        .search-container {
            padding: 20px 40px 10px 40px;
        }

        .search-bar {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid #333;
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .search-bar:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* Grid de Contenido */
        .content-zone { 
            flex: 1; 
            overflow-y: auto; 
            padding: 10px 40px 40px 40px; 
        }

        /* Scrollbar Personalizado */
        .content-zone::-webkit-scrollbar { width: 6px; }
        .content-zone::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 25px; 
            margin-top: 20px;
        }

        .card { 
            background: var(--bg-card); 
            border-radius: 16px; 
            overflow: hidden;
            cursor: pointer; 
            transition: var(--transition); 
            border: 1px solid transparent;
            position: relative;
        }

        .card:hover { 
            transform: translateY(-8px); 
            border-color: var(--accent);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .card-info { padding: 15px; }
        .card-info h4 { margin: 0; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Radio Player Styling */
        .radio-header {
            background: linear-gradient(90deg, #1a1a1a, #252525);
            padding: 40px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        #radio-title { margin-bottom: 20px; font-weight: 300; letter-spacing: 1px; }

        audio { 
            filter: invert(100%) hue-rotate(180deg) brightness(1.5); 
            width: 100%; max-width: 500px; height: 35px;
        }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">VORTEX</div>
        <div class="nav-item active" onclick="showGUI('tv-gui', this)"><span>📺</span> TV En Vivo</div>
        <div class="nav-item" onclick="showGUI('radio-gui', this)"><span>📻</span> Radio Digital</div>
    </aside>

    <main id="tv-gui" class="gui-view active">
        <div class="player-zone">
            <video id="tv-video" controls poster="https://images.unsplash.com/photo-1594909122845-11baa439b7bf?auto=format&fit=crop&q=80&w=1000"></video>
        </div>
        <div class="search-container">
            <input type="text" id="tv-search" class="search-bar" placeholder="Buscar canales de televisión mundial...">
        </div>
        <div class="content-zone">
            <div class="grid" id="tv-grid">
                </div>
        </div>
    </main>

    <main id="radio-gui" class="gui-view">
        <div class="radio-header">
            <h2 id="radio-title">Selecciona una emisora</h2>
            <audio id="radio-audio" controls></audio>
        </div>
        <div class="search-container">
            <input type="text" id="radio-search" class="search-bar" placeholder="Buscar emisoras por nombre o género...">
        </div>
        <div class="content-zone">
            <div class="grid" id="radio-grid"></div>
        </div>
    </main>

    <script>
        function showGUI(id, el) {
            document.querySelectorAll('.gui-view').forEach(g => g.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        // Simulación de carga y renderizado (Lógica mejorada)
        async function loadRadio(q = 'Colombia') {
            const grid = document.getElementById('radio-grid');
            grid.innerHTML = '<p style="color:var(--text-dim)">Cargando emisoras...</p>';
            
            try {
                const res = await fetch(`https://de1.api.radio-browser.info/json/stations/byname/${q}?limit=40`);
                const data = await res.json();
                grid.innerHTML = '';
                
                data.forEach(r => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div style="height:120px; background:#222; display:flex; align-items:center; justify-content:center; font-size:2rem;">📻</div>
                        <div class="card-info">
                            <h4>${r.name}</h4>
                            <small style="color:var(--text-dim)">${r.country}</small>
                        </div>
                    `;
                    card.onclick = () => {
                        document.getElementById('radio-title').innerText = `Reproduciendo: ${r.name}`;
                        const audio = document.getElementById('radio-audio');
                        audio.src = r.url_resolved;
                        audio.play();
                    };
                    grid.appendChild(card);
                });
            } catch (e) {
                grid.innerHTML = '<p>Error al cargar radios.</p>';
            }
        }

        // Escuchar búsquedas
        document.getElementById('radio-search').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') loadRadio(e.target.value);
        });

        // Inicialización
        loadRadio();
    </script>
</body>
</html>
